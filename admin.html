<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel ADM - Ateliê Mariana Almeida</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-gray-50 p-4">

    <div id="login-area" class="max-w-sm mx-auto mt-20 bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-[#5d4037]">Acesso da Mariana</h2>
            <p class="text-gray-400 text-sm">Digite sua senha para gerenciar</p>
        </div>
        <input type="password" id="senha" placeholder="Senha (mariana2026)" class="w-full border p-3 mb-4 rounded-xl focus:ring-2 focus:ring-[#d7ccc8] outline-none">
        <button onclick="verificarSenha()" class="w-full bg-[#5d4037] text-white p-3 rounded-xl font-bold hover:bg-[#4e342e] transition-all">Entrar no Painel</button>
    </div>

    <div id="admin-area" class="max-w-2xl mx-auto hidden">
        <header class="flex justify-between items-center mb-8 bg-white p-4 rounded-2xl shadow-sm">
            <div>
                <h1 class="text-xl font-bold text-[#5d4037]">Gerenciar Ateliê</h1>
                <p class="text-xs text-green-600 font-semibold">● Online e Sincronizado</p>
            </div>
            <button onclick="location.reload()" class="text-sm bg-gray-100 px-4 py-2 rounded-lg text-gray-500 hover:bg-red-50 hover:text-red-500 transition-all">Sair</button>
        </header>

        <div class="bg-amber-50 border border-amber-200 p-4 rounded-xl mb-6 flex justify-between items-center">
            <span class="text-amber-800 text-sm font-medium">Deseja carregar itens de teste para demonstração?</span>
            <button onclick="gerarDemo()" class="bg-amber-500 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-sm">Sim, Carregar!</button>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-md mb-8">
            <h3 class="font-bold text-[#5d4037] mb-4 flex items-center gap-2">
                <span class="bg-[#d7ccc8] p-1 rounded-md">➕</span> Adicionar Novo Item
            </h3>
            <div class="grid gap-4">
                <input type="text" id="nome" placeholder="Nome do Bolo/Doce" class="border p-3 rounded-xl outline-none focus:border-[#5d4037]">
                <textarea id="desc" placeholder="Descrição (ex: Massa fofinha com recheio gourmet)" class="border p-3 rounded-xl outline-none focus:border-[#5d4037]"></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="preco" placeholder="Preço (Ex: 25.00)" class="border p-3 rounded-xl">
                    <input type="text" id="foto" placeholder="Link da Foto (ImgBB)" class="border p-3 rounded-xl">
                </div>
                <button onclick="salvarProduto()" id="btn-salvar" class="bg-[#5d4037] text-white p-4 rounded-xl font-bold shadow-lg hover:shadow-none transition-all">Salvar no Cardápio</button>
            </div>
        </div>

        <h3 class="font-bold text-[#5d4037] mb-4">Itens Atuais no Site:</h3>
        <div id="lista-admin" class="grid gap-4"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA93ymW78OYYHc2qGoF-5D_RgWdCzkxh58",
            authDomain: "atelie-mariana.firebaseapp.com",
            projectId: "atelie-mariana",
            storageBucket: "atelie-mariana.firebasestorage.app",
            messagingSenderId: "416743252478",
            appId: "1:416743252478:web:543a9c03574dfca3d960af"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.verificarSenha = () => {
            if(document.getElementById('senha').value === 'mariana2026') {
                document.getElementById('login-area').classList.add('hidden');
                document.getElementById('admin-area').classList.remove('hidden');
                carregarAdmin();
            } else { alert('Senha incorreta!'); }
        };

        window.salvarProduto = async (dadosManuais = null) => {
            const btn = document.getElementById('btn-salvar');
            btn.innerText = "Salvando...";
            btn.disabled = true;

            const produto = dadosManuais || {
                nome: document.getElementById('nome').value,
                preco: parseFloat(document.getElementById('preco').value),
                foto: document.getElementById('foto').value,
                descricao: document.getElementById('desc').value,
                status: "disponivel"
            };

            try {
                await addDoc(collection(db, "produtos"), produto);
                if(!dadosManuais) alert("Produto cadastrado com sucesso!");
            } catch (e) { console.error(e); }

            btn.innerText = "Salvar no Cardápio";
            btn.disabled = false;
        };

        window.gerarDemo = async () => {
            const demos = [
                { nome: "Bolo de Red Velvet", preco: 85.00, descricao: "Massa aveludada com recheio de cream cheese.", foto: "https://images.unsplash.com/photo-1616541823729-00fe0aacd32c?w=500", status: "disponivel" },
                { nome: "Fatia de Chocolate Belga", preco: 18.50, descricao: "Chocolate 70% cacau e morangos frescos.", foto: "https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=500", status: "disponivel" },
                { nome: "Bento Cake Personalizado", preco: 45.00, descricao: "Mini bolo para presentear quem você ama.", foto: "https://images.unsplash.com/photo-1621303837174-89787a7d4729?w=500", status: "disponivel" }
            ];
            for(let item of demos) { await salvarProduto(item); }
            alert("Itens de demonstração adicionados!");
        };

        function carregarAdmin() {
            onSnapshot(collection(db, "produtos"), (snapshot) => {
                const list = document.getElementById('lista-admin');
                list.innerHTML = '';
                snapshot.forEach((d) => {
                    const p = d.data();
                    list.innerHTML += `
                        <div class="bg-white p-4 rounded-xl flex items-center gap-4 shadow-sm border border-gray-100">
                            <img src="${p.foto}" class="w-12 h-12 rounded-lg object-cover">
                            <div class="flex-1">
                                <p class="font-bold text-[#5d4037]">${p.nome}</p>
                                <p class="text-sm text-[#a1887f]">R$ ${p.preco.toFixed(2)}</p>
                            </div>
                            <button onclick="excluir('${d.id}')" class="bg-red-50 text-red-500 p-2 rounded-lg hover:bg-red-500 hover:text-white transition-all">Apagar</button>
                        </div>
                    `;
                });
            });
        }

        window.excluir = async (id) => {
            if(confirm("Deseja apagar este item do cardápio?")) {
                await deleteDoc(doc(db, "produtos", id));
            }
        };
    </script>
</body>
</html>
