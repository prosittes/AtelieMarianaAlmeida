<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel - Mariana Almeida</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div id="login-area" class="max-w-sm mx-auto mt-20 bg-white p-8 rounded-xl shadow-lg">
        <h2 class="text-xl font-bold mb-4">Acesso Restrito</h2>
        <input type="password" id="senha" placeholder="Senha de Acesso" class="w-full border p-2 mb-4 rounded">
        <button onclick="verificarSenha()" class="w-full bg-black text-white p-2 rounded">Entrar</button>
    </div>

    <div id="admin-area" class="max-w-2xl mx-auto hidden">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold">Gerenciar Cardápio</h1>
            <button onclick="location.reload()" class="text-sm text-red-500">Sair</button>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-md mb-8">
            <h3 class="font-bold mb-4">Adicionar Novo Doce</h3>
            <div class="grid gap-4">
                <input type="text" id="nome" placeholder="Nome do Doce" class="border p-2 rounded">
                <input type="text" id="desc" placeholder="Descrição curta" class="border p-2 rounded">
                <div class="flex gap-2">
                    <input type="number" id="preco" placeholder="Preço (Ex: 15.50)" class="border p-2 rounded w-1/2">
                    <input type="text" id="foto" placeholder="Link da Foto (ImgBB)" class="border p-2 rounded w-1/2">
                </div>
                <button onclick="salvarProduto()" class="bg-green-600 text-white p-3 rounded font-bold">Salvar no Cardápio</button>
            </div>
        </div>

        <div id="lista-admin" class="grid gap-4"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA93ymW78OYYHc2qGoF-5D_RgWdCzkxh58",
            authDomain: "atelie-mariana.firebaseapp.com",
            projectId: "atelie-mariana",
            storageBucket: "atelie-mariana.firebasestorage.app",
            messagingSenderId: "416743252478",
            appId: "1:416743252478:web:543a9c03574dfca3d960af"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.verificarSenha = () => {
            const senha = document.getElementById('senha').value;
            if(senha === 'mariana2026') {
                document.getElementById('login-area').classList.add('hidden');
                document.getElementById('admin-area').classList.remove('hidden');
                carregarAdmin();
            } else { alert('Senha incorreta!'); }
        };

        window.salvarProduto = async () => {
            const nome = document.getElementById('nome').value;
            const preco = parseFloat(document.getElementById('preco').value);
            const foto = document.getElementById('foto').value;
            const descricao = document.getElementById('desc').value;

            await addDoc(collection(db, "produtos"), { nome, preco, foto, descricao, status: "disponivel" });
            alert("Sucesso!");
            location.reload();
        };

        function carregarAdmin() {
            onSnapshot(collection(db, "produtos"), (snapshot) => {
                const list = document.getElementById('lista-admin');
                list.innerHTML = '';
                snapshot.forEach((d) => {
                    const p = d.data();
                    list.innerHTML += `
                        <div class="bg-white p-4 rounded-lg flex justify-between items-center shadow-sm">
                            <div>
                                <p class="font-bold">${p.nome}</p>
                                <p class="text-sm text-green-600 font-bold">R$ ${p.preco}</p>
                            </div>
                            <button onclick="excluir('${d.id}')" class="text-red-500 text-sm">Excluir</button>
                        </div>
                    `;
                });
            });
        }

        window.excluir = async (id) => {
            if(confirm("Deseja apagar este item?")) {
                await deleteDoc(doc(db, "produtos", id));
            }
        };
    </script>
</body>
</html>
