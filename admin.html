<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Mariana - Upload Direto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Montserrat', sans-serif; }</style>
</head>
<body class="bg-gray-50 p-4 pb-20">

    <div id="login-area" class="max-w-sm mx-auto mt-20 bg-white p-8 rounded-2xl shadow-xl border border-gray-100 text-center">
        <h2 class="text-2xl font-bold text-[#5d4037] mb-6">Acesso Ateliê</h2>
        <input type="password" id="senha" placeholder="Senha (mariana2026)" class="w-full border p-3 mb-4 rounded-xl outline-none focus:ring-2 focus:ring-[#d7ccc8]">
        <button onclick="verificarSenha()" class="w-full bg-[#5d4037] text-white p-3 rounded-xl font-bold">Entrar</button>
    </div>

    <div id="admin-area" class="max-w-xl mx-auto hidden">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold text-[#5d4037]">Novo Doce no Cardápio</h1>
            <button onclick="location.reload()" class="text-xs text-red-400">Sair</button>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-md space-y-4">
            <input type="text" id="nome" placeholder="Nome do Bolo" class="w-full border p-3 rounded-xl outline-none">
            <textarea id="desc" placeholder="Descrição (ex: Recheio de brigadeiro)" class="w-full border p-3 rounded-xl outline-none"></textarea>
            <input type="number" id="preco" placeholder="Preço (Ex: 25.00)" class="w-full border p-3 rounded-xl outline-none">
            
            <div class="border-2 border-dashed border-[#d7ccc8] p-6 rounded-2xl text-center bg-[#faf9f8]">
                <label class="cursor-pointer block">
                    <span class="text-3xl">📸</span>
                    <p class="text-[#5d4037] font-semibold mt-2">Toque para escolher da Galeria</p>
                    <input type="file" id="arquivo-foto" accept="image/*" class="hidden" onchange="mostrarNome()">
                </label>
                <p id="nome-arquivo" class="text-xs text-gray-400 mt-2 italic">Nenhuma foto selecionada</p>
            </div>

            <button onclick="salvarTudo()" id="btn-salvar" class="w-full bg-[#5d4037] text-white p-4 rounded-xl font-bold shadow-lg active:scale-95 transition-all">POSTAR NO SITE</button>
        </div>

        <h3 class="font-bold text-[#5d4037] mt-10 mb-4 text-center">Itens que estão no seu site:</h3>
        <div id="lista-admin" class="space-y-3"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA93ymW78OYYHc2qGoF-5D_RgWdCzkxh58",
            authDomain: "atelie-mariana.firebaseapp.com",
            projectId: "atelie-mariana",
            storageBucket: "atelie-mariana.firebasestorage.app",
            messagingSenderId: "416743252478",
            appId: "1:416743252478:web:543a9c03574dfca3d960af"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        window.verificarSenha = () => {
            if(document.getElementById('senha').value === 'mariana2026') {
                document.getElementById('login-area').classList.add('hidden');
                document.getElementById('admin-area').classList.remove('hidden');
                carregarLista();
            } else { alert("Senha incorreta!"); }
        };

        window.mostrarNome = () => {
            const file = document.getElementById('arquivo-foto').files[0];
            document.getElementById('nome-arquivo').innerText = file ? "✓ " + file.name : "Nenhuma foto selecionada";
        };

        window.salvarTudo = async () => {
            const btn = document.getElementById('btn-salvar');
            const file = document.getElementById('arquivo-foto').files[0];
            const nome = document.getElementById('nome').value;
            const preco = document.getElementById('preco').value;

            if(!file || !nome || !preco) return alert("Preencha o nome, preço e escolha uma foto!");

            btn.innerText = "Enviando para o Google...";
            btn.disabled = true;

            try {
                // 1. Sobe a foto para o Storage
                const storageRef = ref(storage, 'bolos/' + Date.now() + "_" + file.name);
                await uploadBytes(storageRef, file);
                const urlFinal = await getDownloadURL(storageRef);

                // 2. Salva no Banco de Dados
                await addDoc(collection(db, "produtos"), {
                    nome: nome,
                    descricao: document.getElementById('desc').value,
                    preco: parseFloat(preco),
                    foto: urlFinal,
                    status: "disponivel"
                });

                alert("Sucesso! Já está no seu site.");
                location.reload();
            } catch (e) {
                alert("Erro ao salvar: " + e.message);
                btn.disabled = false;
                btn.innerText = "POSTAR NO SITE";
            }
        };

        function carregarLista() {
            onSnapshot(collection(db, "produtos"), (snap) => {
                const container = document.getElementById('lista-admin');
                container.innerHTML = '';
                snap.forEach(d => {
                    const p = d.data();
                    container.innerHTML += `
                        <div class="bg-white p-3 rounded-xl flex items-center justify-between shadow-sm border border-gray-100">
                            <div class="flex items-center gap-3">
                                <img src="${p.foto}" class="w-10 h-10 rounded-lg object-cover">
                                <div><p class="text-sm font-bold text-[#5d4037]">${p.nome}</p><p class="text-xs text-gray-400">R$ ${p.preco.toFixed(2)}</p></div>
                            </div>
                            <button onclick="excluirItem('${d.id}')" class="text-red-400 text-xs font-bold p-2">Apagar</button>
                        </div>
                    `;
                });
            });
        }

        window.excluirItem = async (id) => {
            if(confirm("Deseja apagar este item?")) await deleteDoc(doc(db, "produtos", id));
        };
    </script>
</body>
</html>
