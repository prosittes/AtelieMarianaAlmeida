<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ateliê Mariana Almeida - Cardápio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #fdfaf7; }
        h1, h2 { font-family: 'Playfair Display', serif; }
        .card-produto { transition: transform 0.2s; }
        .card-produto:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="pb-24">

    <header class="text-center py-10 bg-white shadow-sm">
        <h1 class="text-3xl text-[#5d4037]">Ateliê Mariana Almeida</h1>
        <p class="text-[#8d6e63] italic text-sm mt-2">Bolos e Doces Artesanais</p>
    </header>

    <main id="lista-produtos" class="max-w-md mx-auto px-4 mt-8 grid gap-6">
        <p class="text-center text-gray-400 italic">Carregando delícias...</p>
    </main>

    <div id="btn-carrinho" class="fixed bottom-6 right-6 left-6 bg-[#5d4037] text-white p-4 rounded-2xl shadow-2xl flex justify-between items-center hidden cursor-pointer transition-all active:scale-95" onclick="enviarWhatsApp()">
        <div class="flex flex-col">
            <span id="itens-contagem" class="text-xs opacity-80">0 itens selecionados</span>
            <span class="font-bold">Pedir pelo WhatsApp</span>
        </div>
        <span id="total-carrinho" class="text-xl font-bold">R$ 0,00</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA93ymW78OYYHc2qGoF-5D_RgWdCzkxh58",
            authDomain: "atelie-mariana.firebaseapp.com",
            projectId: "atelie-mariana",
            storageBucket: "atelie-mariana.firebasestorage.app",
            messagingSenderId: "416743252478",
            appId: "1:416743252478:web:543a9c03574dfca3d960af"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let carrinho = [];

        // Carregar Produtos em Tempo Real
        onSnapshot(collection(db, "produtos"), (snapshot) => {
            const container = document.getElementById('lista-produtos');
            container.innerHTML = '';
            snapshot.forEach((doc) => {
                const p = doc.data();
                if(p.status !== "indisponivel") {
                    container.innerHTML += `
                        <div class="card-produto bg-white rounded-2xl overflow-hidden shadow-md border border-gray-50">
                            <img src="${p.foto}" class="w-full h-48 object-cover">
                            <div class="p-4">
                                <h3 class="font-semibold text-lg text-[#5d4037]">${p.nome}</h3>
                                <p class="text-xs text-gray-500 mb-3">${p.descricao}</p>
                                <div class="flex justify-between items-center">
                                    <span class="text-[#a1887f] font-bold text-xl">R$ ${parseFloat(p.preco).toFixed(2).replace('.',',')}</span>
                                    <button onclick="addCarrinho('${p.nome}', ${p.preco})" class="bg-[#d7ccc8] text-[#5d4037] px-4 py-2 rounded-lg font-bold active:bg-[#bcaaa4] transition-colors">+ Add</button>
                                </div>
                            </div>
                        </div>
                    `;
                }
            });
        });

        window.addCarrinho = (nome, preco) => {
            carrinho.push({nome, preco});
            atualizarCarrinho();
        };

        function atualizarCarrinho() {
            const btn = document.getElementById('btn-carrinho');
            const totalElement = document.getElementById('total-carrinho');
            const contagem = document.getElementById('itens-contagem');
            
            const total = carrinho.reduce((sum, item) => sum + item.preco, 0);
            
            if(carrinho.length > 0) {
                btn.classList.remove('hidden');
                totalElement.innerText = `R$ ${total.toFixed(2).replace('.',',')}`;
                contagem.innerText = `${carrinho.length} itens selecionados`;
            }
        }

        window.enviarWhatsApp = () => {
            let texto = "🧁 *Olá Mariana! Gostaria de fazer um pedido:*%0a%0a";
            carrinho.forEach(item => {
                texto += `• ${item.nome} - R$ ${item.preco.toFixed(2)}%0a`;
            });
            const total = carrinho.reduce((sum, item) => sum + item.preco, 0);
            texto += `%0a*Total: R$ ${total.toFixed(2)}*%0a%0a_Por favor, me confirme a disponibilidade!_`;
            
            window.open(`https://wa.me/5512996733698?text=${texto}`); // COLOQUE O WHATS DA MARIANA AQUI
        };
    </script>
</body>
</html>
