<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Ateliê Mariana Almeida</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fafaf9;
        }
        h1, h2, h3, .brand-font {
            font-family: 'Playfair Display', serif;
        }
        .admin-card {
            transition: all 0.2s ease;
        }
        .admin-card:hover {
            box-shadow: 0 10px 30px -5px rgba(0,0,0,0.1);
        }
        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #10b981;
        }
        input:checked + .slider:before {
            transform: translateX(24px);
        }
        .modal {
            backdrop-filter: blur(5px);
        }
    </style>
<base target="_blank">
</head>
<body class="text-stone-800">

    <!-- Login Screen -->
    <div id="loginScreen" class="fixed inset-0 bg-stone-900 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-lock text-amber-700 text-2xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-stone-900">Área Administrativa</h2>
                <p class="text-stone-500 mt-2">Ateliê Mariana Almeida</p>
            </div>
            
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-stone-700 mb-2">Senha de Acesso</label>
                    <input type="password" id="adminPassword" placeholder="Digite a senha" 
                           class="w-full px-4 py-3 rounded-xl border border-stone-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition-all">
                </div>
                <button type="submit" class="w-full bg-stone-900 hover:bg-stone-800 text-white py-3 rounded-xl font-medium transition-colors">
                    Entrar
                </button>
                <p id="loginError" class="text-red-500 text-sm text-center hidden">Senha incorreta!</p>
            </form>
        </div>
    </div>

    <!-- Admin Dashboard (Hidden initially) -->
    <div id="adminDashboard" class="hidden">
        <!-- Header -->
        <header class="bg-white shadow-sm sticky top-0 z-40">
            <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-amber-100 rounded-full flex items-center justify-center">
                        <i class="fas fa-cog text-amber-700"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-stone-900">Dashboard</h1>
                        <p class="text-xs text-stone-500">Gerencie seus produtos</p>
                    </div>
                </div>
                <button onclick="logout()" class="text-stone-500 hover:text-stone-700 px-4 py-2 rounded-lg hover:bg-stone-100 transition-colors">
                    <i class="fas fa-sign-out-alt mr-2"></i>Sair
                </button>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-4 py-8">
            <!-- Stats Cards -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-stone-100">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-stone-500 text-sm">Total de Produtos</p>
                            <p class="text-2xl font-bold text-stone-900" id="totalProducts">0</p>
                        </div>
                        <div class="w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center">
                            <i class="fas fa-box text-blue-600"></i>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-stone-100">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-stone-500 text-sm">Disponíveis</p>
                            <p class="text-2xl font-bold text-green-600" id="availableProducts">0</p>
                        </div>
                        <div class="w-12 h-12 bg-green-50 rounded-full flex items-center justify-center">
                            <i class="fas fa-check-circle text-green-600"></i>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-stone-100">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-stone-500 text-sm">Esgotados</p>
                            <p class="text-2xl font-bold text-red-600" id="unavailableProducts">0</p>
                        </div>
                        <div class="w-12 h-12 bg-red-50 rounded-full flex items-center justify-center">
                            <i class="fas fa-times-circle text-red-600"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Bar -->
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
                <h2 class="text-xl font-bold text-stone-900">Produtos</h2>
                <button onclick="openModal()" class="bg-stone-900 hover:bg-stone-800 text-white px-6 py-3 rounded-xl font-medium transition-colors flex items-center gap-2">
                    <i class="fas fa-plus"></i>
                    Novo Produto
                </button>
            </div>

            <!-- Products Table -->
            <div class="bg-white rounded-2xl shadow-sm border border-stone-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-stone-50 border-b border-stone-200">
                            <tr>
                                <th class="text-left px-6 py-4 text-sm font-semibold text-stone-700">Produto</th>
                                <th class="text-left px-6 py-4 text-sm font-semibold text-stone-700">Categoria</th>
                                <th class="text-left px-6 py-4 text-sm font-semibold text-stone-700">Preço</th>
                                <th class="text-center px-6 py-4 text-sm font-semibold text-stone-700">Status</th>
                                <th class="text-right px-6 py-4 text-sm font-semibold text-stone-700">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody" class="divide-y divide-stone-100">
                            <!-- Products will be injected here -->
                        </tbody>
                    </table>
                </div>
                <div id="emptyTable" class="hidden text-center py-12">
                    <div class="w-16 h-16 bg-stone-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fas fa-inbox text-stone-400 text-2xl"></i>
                    </div>
                    <p class="text-stone-500">Nenhum produto cadastrado</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Product Modal -->
    <div id="productModal" class="fixed inset-0 bg-black/50 z-50 hidden modal flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-lg max-h-[90vh] overflow-y-auto shadow-2xl">
            <div class="p-6 border-b border-stone-100 flex items-center justify-between sticky top-0 bg-white rounded-t-3xl">
                <h3 class="text-xl font-bold text-stone-900" id="modalTitle">Novo Produto</h3>
                <button onclick="closeModal()" class="w-8 h-8 rounded-full hover:bg-stone-100 flex items-center justify-center transition-colors">
                    <i class="fas fa-times text-stone-500"></i>
                </button>
            </div>
            
            <form id="productForm" class="p-6 space-y-4">
                <input type="hidden" id="productId">
                
                <div>
                    <label class="block text-sm font-medium text-stone-700 mb-2">Nome do Produto *</label>
                    <input type="text" id="productName" required placeholder="Ex: Bolo de Chocolate"
                           class="w-full px-4 py-3 rounded-xl border border-stone-300 focus:border-amber-500 focus:ring-2 focus:ring-amber-200 outline-none transition-all">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-stone-700 mb-2">Preço (R$) *</label>
                        <input type="number" id="productPrice" required step="0.01" min="0" placeholder="0,00"
                               class="w-full px-4 py-3 rounded-xl border border-stone-300 focus:border-amber-500 focus:ring-2 focus
